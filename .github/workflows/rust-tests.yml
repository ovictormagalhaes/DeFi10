name: Rust Tests

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend-rust/**'
      - '.github/workflows/rust-tests.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'backend-rust/**'
      - '.github/workflows/rust-tests.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: backend-rust

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend-rust
          shared-key: ci-debug

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        env:
          RUSTFLAGS: -Dwarnings
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all --verbose

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-tarpaulin
        run: cargo binstall cargo-tarpaulin --no-confirm

      - name: Install llvm-tools
        run: rustup component add llvm-tools-preview

      - name: Run coverage
        run: |
          cargo tarpaulin \
            --workspace \
            --engine llvm \
            --out xml \
            --output-dir ./coverage \
            --timeout 600 \
            --exclude defi10-worker defi10-infrastructure defi10-blockchain \
            --exclude-files "crates/worker/*" "crates/infrastructure/*" "crates/blockchain/*" "**/main.rs"

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rust-coverage-report
          path: backend-rust/coverage/cobertura.xml
          retention-days: 30

      - name: Publish Coverage Summary
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const xml = fs.readFileSync('backend-rust/coverage/cobertura.xml', 'utf8');

            const lineRateMatch = xml.match(/<coverage[^>]+line-rate="([\d.]+)"/);
            const branchRateMatch = xml.match(/<coverage[^>]+branch-rate="([\d.]+)"/);

            const lineCoverage = lineRateMatch ? (parseFloat(lineRateMatch[1]) * 100).toFixed(2) + '%' : 'N/A';
            const branchCoverage = branchRateMatch ? (parseFloat(branchRateMatch[1]) * 100).toFixed(2) + '%' : 'N/A';

            const comment = `## 🦀 Rust Code Coverage Report

            | Metric | Value |
            |--------|-------|
            | Line Coverage | ${lineCoverage} |
            | Branch Coverage | ${branchCoverage} |

            [View Full Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;

            try {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (error) {
              console.log('Could not post coverage comment:', error.message);
            }
