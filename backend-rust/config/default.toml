[server]
host = "0.0.0.0"
port = 10000

[mongodb]
uri = "mongodb://localhost:27017"
database = "defi10"

[redis]
url = "redis://localhost:6379"
pool_size = 10
default_ttl_seconds = 300

[rabbitmq]
url = "amqp://guest:guest@localhost:5672"
prefetch_count = 10

[jwt]
secret = "dev_secret_change_in_production"
expiration_hours = 24

[cors]
allowed_origins = ["http://localhost:3000", "http://localhost:8080", "http://localhost:10002"]

[rate_limiting]
enabled = true
max_requests = 100
window_seconds = 60

[blockchain]
# Public RPCs (free tier, pode ter rate limits)
ethereum_rpc = "https://eth.llamarpc.com"
base_rpc = "https://mainnet.base.org"
arbitrum_rpc = "https://arb1.arbitrum.io/rpc"
bnb_rpc = "https://bsc-dataseed.binance.org"
solana_rpc = "https://api.mainnet-beta.solana.com"

[graph]
url_template = "https://gateway.thegraph.com/api/{API_KEY}/subgraphs/id/{ID}"

