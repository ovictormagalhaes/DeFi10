services:
  # Frontend React App - Static Site (Free Tier)
  - type: static
    name: defi10-frontend
    buildCommand: |
      npm install
      npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://defi10-1.onrender.com
      - key: REACT_APP_APP_NAME
        value: Defi10
    # SPA routing handled by _redirects file
    routes:
      - type: rewrite
        source: /*
        destination: /index.html